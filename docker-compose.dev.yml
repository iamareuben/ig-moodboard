# Local development — builds images from source
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  backend:
    build: ./backend
    environment:
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_REDIRECT_URI: ${META_REDIRECT_URI:-}
      ANALYTICS_MIN_DATE: ${ANALYTICS_MIN_DATE:-}
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    build: ./mcp
    environment:
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      DB_PATH: /app/data/db.sqlite
      VIDEOS_DIR: /app/data/videos
    volumes:
      - app_data:/app/data:ro
    restart: unless-stopped
    depends_on:
      - backend

  # Cloudflare Tunnel for external HTTPS access
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    env_file: .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - mcp

volumes:
  app_data:
