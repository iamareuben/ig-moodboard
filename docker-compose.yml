# Production — uses pre-built images from GitHub Container Registry
# For local development with live builds: docker compose -f docker-compose.dev.yml up

services:
  backend:
    image: ghcr.io/iamareuben/ig-moodboard-backend:latest
    pull_policy: always
    env_file: .env
    environment:
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_REDIRECT_URI: ${META_REDIRECT_URI}
      ANALYTICS_MIN_DATE: ${ANALYTICS_MIN_DATE}
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/iamareuben/ig-moodboard-frontend:latest
    pull_policy: always
    ports:
      - "8082:80"  # Optional direct access; tunnel uses http://frontend:80 internally
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    image: ghcr.io/iamareuben/ig-moodboard-mcp:latest
    pull_policy: always
    environment:
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      DB_PATH: /app/data/db.sqlite
      VIDEOS_DIR: /app/data/videos
    volumes:
      - app_data:/app/data:ro
    restart: unless-stopped
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    env_file: .env
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - frontend
      - mcp

volumes:
  app_data:
